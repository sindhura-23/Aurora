<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Georgia, serif;
}

.main{
    display:flex;
    align-items:center;
    gap:35px;
    z-index:10;
}

.photo-section{
    position:relative;
}

.birthday-photo{
    width:380px;
    height:650px;
    object-fit:cover;
    border-radius:30px;
    border:3px solid gold;
    box-shadow:
        0 0 15px gold,
        0 0 40px rgba(255,215,0,.35);
}

.message{
    position:absolute;
    left:50%;
    bottom:25px;
    transform:translateX(-50%);
    width:85%;
    color:white;
    text-align:center;
    font-size:20px;
    line-height:1.7;
    text-shadow:
        0 0 10px black,
        0 0 20px black;
    background:rgba(0,0,0,.35);
    padding:15px;
    border-radius:15px;
}

.vertical{
    color:white;
    text-align:center;
    font-size:95px;
    font-weight:300;
    line-height:1.05;
    letter-spacing:4px;
    text-shadow:
        0 0 10px white,
        0 0 20px white,
        0 0 35px white;
}

.divider{
    width:2px;
    height:650px;
    background:white;
    box-shadow:0 0 12px white;
}

.star{
    position:fixed;
    color:white;
    opacity:.4;
    animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:.2;
    }
    to{
        opacity:.8;
        text-shadow:0 0 10px white;
    }
}

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .main{
        transform:scale(.75);
    }
}

</style>
</head>

<body>

<div class="main">

    <div class="photo-section">

        <img src="IMG_20260620_211807.jpg" class="birthday-photo">

        <div class="message">

            On your special day,<br><br>

            I wish you a successful career,<br><br>

            a joyful heart,<br><br>

            a peaceful mind,<br><br>

            and a future brighter than you ever imagined.<br><br>

            ✨ Happy Birthday ✨

        </div>

    </div>

    <div class="vertical">
        H<br>
        A<br>
        P<br>
        P<br>
        Y
    </div>

    <div class="divider"></div>

    <div class="vertical">
        B<br>
        I<br>
        R<br>
        T<br>
        H<br>
        D<br>
        A<br>
        Y
    </div>

</div>

<script>

for(let i=0;i<25;i++){

    let star=document.createElement("div");

    star.classList.add("star");

    star.innerHTML="✦";

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.fontSize=(Math.random()*6+6)+"px";
    star.style.animationDelay=Math.random()*4+"s";

    document.body.appendChild(star);
}

</script>

</body>
</html>
