<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 𝗛𝗮𝗽𝗽𝘆 𝗕𝗶𝗿𝘁𝗵𝗱𝗮𝘆 ✨</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at top,
                #1b2735 0%,
                #090a0f 60%,
                #000000 100%);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:'Trebuchet MS',sans-serif;
}

.container{
    width:90%;
    max-width:900px;
    z-index:10;
}

.birthday{
    font-size:4rem;
    font-weight:300;
    letter-spacing:8px;
    color:#ffd700;
    text-transform:uppercase;
    text-shadow:
        0 0 10px #ffd700,
        0 0 20px #ffd700,
        0 0 40px #ffec8b,
        0 0 60px #fff8dc;
    animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:
            0 0 10px #ffd700,
            0 0 20px #ffd700,
            0 0 40px #ffec8b;
    }
    to{
        text-shadow:
            0 0 20px #ffd700,
            0 0 40px #ffd700,
            0 0 80px #fff8dc;
    }
}

.line{
    opacity:0;
    color:white;
    font-size:1.6rem;
    font-weight:300;
    letter-spacing:2px;
    margin:18px 0;
    animation:showText 2s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:4s;}
.line:nth-child(3){animation-delay:7s;}
.line:nth-child(4){animation-delay:10s;}
.line:nth-child(5){animation-delay:13s;}

@keyframes showText{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.emoji{
    position:absolute;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(120vh);
    }
}

.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    color:white;
    font-size:12px;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{
        opacity:1;
        text-shadow:0 0 15px white;
    }
}

.footer{
    margin-top:30px;
    color:#ffd700;
    font-size:1.2rem;
    opacity:0;
    animation:showText 2s forwards;
    animation-delay:16s;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container">

<div class="line birthday">
✨ HAPPY BIRTHDAY ✨
</div>

<div class="line">
On your special day,
</div>

<div class="line">
I wish you a successful career,
</div>

<div class="line">
a joyful heart and a peaceful mind,
</div>

<div class="line">
and a future brighter than you ever imagined.
</div>

<div class="footer">
🎉 Wishing you endless happiness, success and beautiful memories 🎊
</div>

</div>

<script>

// Floating celebration emojis
const emojis = ["🎉","🎊","✨","⭐","💫","🎂","🎈","🥳"];

for(let i=0;i<100;i++){

let emoji=document.createElement("div");
emoji.classList.add("emoji");

emoji.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

emoji.style.left=Math.random()*100+"vw";
emoji.style.animationDuration=(Math.random()*6+4)+"s";
emoji.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(emoji);
}

// Twinkling stars
const starsContainer=document.querySelector(".stars");

for(let i=0;i<150;i++){

let star=document.createElement("div");
star.classList.add("star");

star.innerHTML="✦";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
star.style.animationDelay=Math.random()*3+"s";

starsContainer.appendChild(star);
}

</script>

</body>
</html>
