<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Georgia,serif;
}

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('IMG_20260620_211807.jpg') center center/cover no-repeat;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,.75),
rgba(0,0,0,.15),
rgba(0,0,0,.05)
);

display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:30px;
text-align:center;
}

.happy{
color:white;
font-size:22px;
letter-spacing:10px;
margin-bottom:5px;
}

.birthday{
color:#FFD700;
font-size:70px;
font-family:cursive;
text-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700,
0 0 40px #FFD700;
margin-bottom:20px;
}

.message{
max-width:750px;
color:white;
font-size:20px;
line-height:1.8;
margin-bottom:20px;
text-shadow:0 0 10px black;
}

.music-btn{
background:#FFD700;
color:black;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-bottom:15px;
}

.firework{
position:absolute;
font-size:28px;
animation:fly 6s linear infinite;
opacity:.8;
}

@keyframes fly{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-20vh) scale(1.5);
opacity:0;
}

}

@media(max-width:768px){

.birthday{
font-size:50px;
}

.message{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<div class="overlay">

<div class="happy">
H A P P Y
</div>

<div class="birthday">
Birthday
</div>

<div class="message">

On your special day,<br><br>

I wish you a successful career,
a joyful heart,
a peaceful mind,
and a future brighter than you ever imagined.<br><br>

May every dream become reality,
every effort bring success,
and every day bring happiness,
good health and unforgettable memories.

</div>

<button class="music-btn" onclick="playMusic()">
🎵 Play Song
</button>

</div>

<audio id="music" loop>
<source src="AUD-20260620-WA0000.mp3" type="audio/mpeg">
</audio>

<script>

function playMusic(){
document.getElementById("music").play();
}

const fireworks=["🎆","🎇","✨"];

for(let i=0;i<25;i++){

let fw=document.createElement("div");

fw.className="firework";

fw.innerHTML=fireworks[Math.floor(Math.random()*fireworks.length)];

fw.style.left=Math.random()*100+"vw";
fw.style.animationDuration=(Math.random()*5+4)+"s";
fw.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(fw);
}

</script>

</body>
</html>
